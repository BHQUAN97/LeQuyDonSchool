# ──────────────────────────────────────────
# LeQuyDon — Nginx config cho shared-nginx (Docker)
# Dat tai: /opt/webphoto/nginx/conf.d/lqd.bhquan.store.conf
#
# Dung resolver + set $var de nginx khong crash khi container chua up
# ──────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=lqd_auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=lqd_upload_limit:10m rate=5r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name lqd.bhquan.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name lqd.bhquan.store;

    ssl_certificate     /etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lqd.bhquan.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com data:; img-src 'self' data: blob: https://lqd.bhquan.store https://images.unsplash.com; media-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Docker DNS resolver — dynamic resolution, nginx khong crash khi container chua up
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Chan truy cap hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # ─── Auth endpoints ───────────────────
    location ~ ^/api/(auth|login|register|refresh) {
        limit_req zone=lqd_auth_limit burst=10 nodelay;
        set $lqd_api http://lqd-api:4000;
        proxy_pass $lqd_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── Upload endpoints ─────────────────
    location ~ ^/api/.*/upload {
        limit_req zone=lqd_upload_limit burst=5 nodelay;
        client_max_body_size 20m;
        set $lqd_api http://lqd-api:4000;
        proxy_pass $lqd_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ─── Local uploads (static files) ────
    location /uploads/ {
        set $lqd_api http://lqd-api:4000;
        proxy_pass $lqd_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public";
    }

    # ─── Next.js API routes (draft, revalidate) → Next.js ──
    location ~ ^/api/(draft|revalidate)(/|$) {
        set $lqd_fe http://lqd-frontend:3000;
        proxy_pass $lqd_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── API proxy → NestJS ───────────────
    location /api/ {
        set $lqd_api http://lqd-api:4000;
        proxy_pass $lqd_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Next.js static assets (immutable) ─
    location /_next/static/ {
        set $lqd_fe http://lqd-frontend:3000;
        proxy_pass $lqd_fe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js ───────────
    location / {
        set $lqd_fe http://lqd-frontend:3000;
        proxy_pass $lqd_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
