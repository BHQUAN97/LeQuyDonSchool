# ──────────────────────────────────────────
# LeQuyDon — Nginx config cho shared-nginx (Docker)
# Dat tai: /opt/webphoto/nginx/conf.d/demo.remoteterminal.online.conf
#
# Nginx chay trong Docker container shared-nginx,
# proxy qua Docker network (container name), KHONG dung localhost
# ──────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name demo.remoteterminal.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name demo.remoteterminal.online;

    ssl_certificate     /etc/letsencrypt/live/demo.remoteterminal.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.remoteterminal.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com data:; img-src 'self' data: blob: https://demo.remoteterminal.online https://images.unsplash.com; media-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;

    # ─── Auth endpoints ───────────────────
    location ~ ^/api/(auth|login|register|refresh) {
        proxy_pass http://lqd-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── Upload endpoints ─────────────────
    location ~ ^/api/.*/upload {
        client_max_body_size 20m;
        proxy_pass http://lqd-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ─── Local uploads (static files) ────
    location /uploads/ {
        proxy_pass http://lqd-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public";
    }

    # ─── Next.js API routes (draft, revalidate) → Next.js ──
    location ~ ^/api/(draft|revalidate)(/|$) {
        proxy_pass http://lqd-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ─── API proxy → NestJS ───────────────
    location /api/ {
        proxy_pass http://lqd-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Next.js static assets (immutable) ─
    location /_next/static/ {
        proxy_pass http://lqd-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js ───────────
    location / {
        proxy_pass http://lqd-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
