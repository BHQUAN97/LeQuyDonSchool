name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════
  # 1. SECURITY SCAN — chay truoc, block tat ca neu fail
  # ══════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check .env khong duoc commit
      - name: Check no .env committed
        run: |
          FOUND=$(git ls-files '*.env' '.env.*' '!*.env.example' '!*.env.local.example' 2>/dev/null | grep -v '.example' | grep -v '.local' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Found .env files committed to repo:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK — no .env files in repo"

      # Check hardcoded secrets trong code
      - name: Check hardcoded secrets
        run: |
          FAIL=0

          # Pattern: password/secret/key = "value" (khong phai env var hoac example)
          echo "--- Checking for hardcoded secrets ---"
          SECRETS=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            -iE "(password|secret|api_key|apikey|private_key|access_token)\s*[:=]\s*['\"][^'\"]{8,}" \
            backend/src/ frontend/src/ 2>/dev/null \
            | grep -v '.env' \
            | grep -v '.example' \
            | grep -v 'change-this' \
            | grep -v 'change-me' \
            | grep -v 'placeholder' \
            | grep -v '\.spec\.' \
            | grep -v '\.test\.' \
            | grep -v 'process\.env' \
            | grep -v 'configService' \
            | grep -v 'getOrThrow\|get(' \
            | grep -v 'type\|interface\|comment\|description\|label\|placeholder\|message\|error\|warning' \
            || true)

          if [ -n "$SECRETS" ]; then
            echo "::warning::Possible hardcoded secrets found:"
            echo "$SECRETS"
            # Warning only — manual review needed
          fi

          # Pattern: AWS/Cloudflare keys (high confidence)
          HIGH_RISK=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' \
            -E "(AKIA[0-9A-Z]{16}|re_[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})" \
            backend/src/ frontend/src/ 2>/dev/null || true)

          if [ -n "$HIGH_RISK" ]; then
            echo "::error::HIGH RISK — API keys found in source code:"
            echo "$HIGH_RISK"
            FAIL=1
          fi

          exit $FAIL

      # npm audit — check vuln dependencies
      - name: Audit backend dependencies
        run: |
          cd backend
          npm ci --ignore-scripts
          # critical + high only, warn on moderate
          npm audit --audit-level=high --omit=dev 2>&1 || echo "::warning::Backend has npm audit warnings"

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts
          npm audit --audit-level=high --omit=dev 2>&1 || echo "::warning::Frontend has npm audit warnings"

  # ══════════════════════════════════════════
  # 2. DB CHANGELOG VALIDATION
  # ══════════════════════════════════════════
  db-changelog:
    name: DB Changelog Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history de so sanh

      # Check naming convention
      - name: Validate changelog file naming
        run: |
          FAIL=0
          echo "--- Checking db/changelog/ naming convention ---"

          # _init files: NNN__description.sql
          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null); do
            FNAME=$(basename "$f")
            if ! echo "$FNAME" | grep -qE '^[0-9]{3}__[a-z_]+\.sql$'; then
              echo "::error::Invalid _init filename: $FNAME (expected: NNN__description.sql)"
              FAIL=1
            fi
          done

          # Version directories: semantic version
          for d in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' 2>/dev/null); do
            VER=$(basename "$d")
            if ! echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version directory: $VER (expected: X.Y.Z)"
              FAIL=1
            fi

            # Files in version dirs: NNN__description.sql
            for f in $(find "$d" -name '*.sql' -type f 2>/dev/null); do
              FNAME=$(basename "$f")
              if ! echo "$FNAME" | grep -qE '^[0-9]{3}__[a-z_]+\.sql$'; then
                echo "::error::Invalid changelog filename: $VER/$FNAME (expected: NNN__description.sql)"
                FAIL=1
              fi
            done
          done

          if [ $FAIL -eq 0 ]; then
            echo "OK — all changelog files follow naming convention"
          fi
          exit $FAIL

      # Check SQL safety patterns
      - name: Validate SQL safety
        run: |
          FAIL=0
          echo "--- Checking SQL safety patterns ---"

          for f in $(find db/changelog -name '*.sql' -type f 2>/dev/null); do
            FNAME=$(basename "$f")
            REL_PATH=$(echo "$f" | sed 's|^db/changelog/||')

            # DANGEROUS: DROP TABLE/DATABASE without IF EXISTS
            if grep -qiE '^\s*DROP\s+(TABLE|DATABASE)\s+(?!IF\s+EXISTS)' "$f" 2>/dev/null; then
              echo "::error::$REL_PATH — DROP without IF EXISTS (data loss risk)"
              FAIL=1
            fi

            # DANGEROUS: TRUNCATE TABLE
            if grep -qiE '^\s*TRUNCATE\s+TABLE' "$f" 2>/dev/null; then
              echo "::error::$REL_PATH — TRUNCATE TABLE detected (data loss risk)"
              FAIL=1
            fi

            # DANGEROUS: DELETE without WHERE
            if grep -qiE '^\s*DELETE\s+FROM\s+\w+\s*;' "$f" 2>/dev/null; then
              echo "::warning::$REL_PATH — DELETE without WHERE clause (deletes all rows)"
            fi

            # WARNING: ALTER TABLE ... DROP COLUMN
            if grep -qiE 'ALTER\s+TABLE.*DROP\s+COLUMN' "$f" 2>/dev/null; then
              echo "::warning::$REL_PATH — DROP COLUMN detected (verify data migration done first)"
            fi

            # CHECK: REPLACE INTO (gay cascade delete)
            if grep -qiE '^\s*REPLACE\s+INTO' "$f" 2>/dev/null; then
              echo "::warning::$REL_PATH — REPLACE INTO detected (causes DELETE+INSERT, may trigger cascades). Use INSERT...ON DUPLICATE KEY UPDATE instead."
            fi

            # CHECK: utf8 thay vi utf8mb4
            if grep -qiE "CHARACTER\s+SET\s+utf8[^m]|CHARSET\s*=\s*utf8[^m]" "$f" 2>/dev/null; then
              echo "::error::$REL_PATH — Use utf8mb4, not utf8 (utf8 is 3-byte, cannot store emoji)"
              FAIL=1
            fi
          done

          if [ $FAIL -eq 0 ]; then
            echo "OK — all SQL files pass safety checks"
          fi
          exit $FAIL

      # Check new changelogs have sequential numbering
      - name: Validate changelog ordering
        run: |
          echo "--- Checking changelog sequence ---"
          for d in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' 2>/dev/null | sort); do
            VER=$(basename "$d")
            PREV=0
            for f in $(find "$d" -name '*.sql' -type f 2>/dev/null | sort); do
              NUM=$(basename "$f" | grep -oE '^[0-9]+' || echo "0")
              NUM=$((10#$NUM))  # remove leading zeros
              if [ $NUM -le $PREV ]; then
                echo "::warning::$VER/$(basename $f) — sequence number $NUM not greater than previous $PREV"
              fi
              PREV=$NUM
            done
          done
          echo "OK — changelog ordering checked"

  # ══════════════════════════════════════════
  # 3. BACKEND — Lint + Type + Build + Test
  # ══════════════════════════════════════════
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Lint
        run: cd backend && npm run lint 2>&1 || echo "::warning::Backend lint has warnings"

      - name: Type check
        run: cd backend && npx tsc --noEmit

      - name: Build
        run: cd backend && npm run build

      - name: Test
        run: cd backend && npx jest --passWithNoTests --ci

  # ══════════════════════════════════════════
  # 4. FRONTEND — Lint + Type + Build + Test
  # ══════════════════════════════════════════
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint 2>&1 || echo "::warning::Frontend lint has warnings"

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

      - name: Test
        run: cd frontend && npx vitest run --passWithNoTests 2>&1 || echo "::warning::Frontend tests skipped or failed"
