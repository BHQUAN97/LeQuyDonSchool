name: Auto Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'ThietKe/**'
      - '.sdd/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/cron.yml'
      - '.github/workflows/restore.yml'
      - '.github/workflows/vps-setup.yml'

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  APP_DIR: /opt/lqd
  INFRA_DIR: /opt/infra

# ══════════════════════════════════════════════════════
# Pipeline: typecheck → build → deploy → verify
# ══════════════════════════════════════════════════════

jobs:
  # ─── STAGE 1: TYPE CHECK (parallel) ──────────────
  typecheck-fe:
    name: "1. Typecheck FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: "1. Typecheck BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  # ─── STAGE 2: DETECT CHANGES ─────────────────────
  build:
    name: "2. Detect Changes"
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      fe: ${{ steps.changes.outputs.fe }}
      be: ${{ steps.changes.outputs.be }}
      infra: ${{ steps.changes.outputs.infra }}
      db: ${{ steps.changes.outputs.db }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Detect deploy mode
        id: detect
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4200/api/health > /dev/null 2>&1"; then
            echo "mode=update" >> $GITHUB_OUTPUT
            echo "Deploy mode: UPDATE (API healthy)"
          else
            echo "mode=init" >> $GITHUB_OUTPUT
            echo "Deploy mode: INIT (API not responding)"
          fi

      - name: Detect changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            DIFF="FULL"
          else
            DIFF=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo "FULL")
          fi

          echo "Changed files:"
          echo "$DIFF" | head -20

          fe=false; be=false; infra=false; db=false; config=false

          if [ "$DIFF" = "FULL" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          else
            echo "$DIFF" | grep -qE '^frontend/' && fe=true
            echo "$DIFF" | grep -qE '^backend/' && be=true
            echo "$DIFF" | grep -qE '^(docker-compose|infra/|nginx/|.*/Dockerfile)' && infra=true
            echo "$DIFF" | grep -qE '^(db/|backend/src/.*entity)' && db=true
            echo "$DIFF" | grep -qE '^config/' && config=true
          fi

          if [ "${{ steps.detect.outputs.mode }}" = "init" ]; then
            fe=true; be=true; infra=true; db=true; config=true
          fi

          echo "fe=$fe" >> $GITHUB_OUTPUT
          echo "be=$be" >> $GITHUB_OUTPUT
          echo "infra=$infra" >> $GITHUB_OUTPUT
          echo "db=$db" >> $GITHUB_OUTPUT
          echo "config=$config" >> $GITHUB_OUTPUT
          echo "Changes: fe=$fe be=$be infra=$infra db=$db config=$config"

  # ─── STAGE 3: DEPLOY TO VPS ─────────────────────
  deploy:
    name: "3. Deploy"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Sync .env
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          grep -v '^\s*#' config/env | grep -v '^\s*$' > /tmp/prod.env
          {
            echo "LQD_DB_PASSWORD=${{ secrets.LQD_DB_PASSWORD }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}"
            echo "CRON_SECRET=${{ secrets.CRON_SECRET }}"
          } >> /tmp/prod.env
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/config"
          sshpass -e scp -P $PORT /tmp/prod.env $VPS:${APP_DIR}/.env
          sshpass -e ssh -p $PORT $VPS "chmod 600 ${APP_DIR}/.env && cp ${APP_DIR}/.env ${APP_DIR}/config/env"

      # ── INIT: Full upload ────────────────────────
      - name: "[INIT] Upload full project"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker stop lqd-api lqd-frontend 2>/dev/null || true
            docker rm lqd-api lqd-frontend 2>/dev/null || true
          "
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/{backend,frontend,nginx/conf.d,scripts,db,config} ${INFRA_DIR}/nginx/conf.d"

          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/

          echo "  Uploading backend..."
          tar czf - backend/src backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json \
            backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading frontend..."
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.mjs frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.mjs 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "  Uploading nginx + infra + db + scripts..."
          sshpass -e scp -P $PORT nginx/conf.d/lqd.bhquan.store.conf $VPS:${INFRA_DIR}/nginx/conf.d/lqd.bhquan.store.conf
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true
          tar czf - scripts/ 2>/dev/null | sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

          echo "[OK] Full project uploaded"

      # ── INIT: Infra + DB + SSL ───────────────────
      - name: "[INIT] Start shared infra"
        if: needs.build.outputs.mode == 'init'
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/docker-compose.yml
          printf '%s' "$MYSQL_ROOT_PASSWORD" > /tmp/mysql_root_pass.txt
          sshpass -e scp -P $PORT /tmp/mysql_root_pass.txt $VPS:/tmp/mysql_root_pass.txt
          rm -f /tmp/mysql_root_pass.txt

          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker network create webphoto_backend 2>/dev/null || true
            docker network create lqd_frontend 2>/dev/null || true
            mkdir -p /opt/webphoto/photo-storage/dist

            MYSQL_OK=\$(docker ps --filter name=shared-mysql --filter status=running --format '{{.Names}}' | grep -c shared-mysql || echo 0)
            NGINX_OK=\$(docker ps --filter name=shared-nginx --filter status=running --format '{{.Names}}' | grep -c shared-nginx || echo 0)

            if [ \"\$MYSQL_OK\" -gt 0 ] && [ \"\$NGINX_OK\" -gt 0 ]; then
              echo 'Infra already running — skip'
              rm -f /tmp/mysql_root_pass.txt
            else
              echo 'Starting shared infra...'
              docker pull nginx:1.27-alpine 2>&1 | tail -1
              echo '--- Pre-start: placeholder cert for lqd.bhquan.store (nginx needs cert to start) ---'
              docker run --rm \
                -v shared_certbot_data:/etc/letsencrypt \
                certbot/certbot sh -c '
                  CERT=/etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem
                  if openssl x509 -in \$CERT -noout -checkend 3600 2>/dev/null; then
                    echo Cert already valid for lqd.bhquan.store
                  else
                    mkdir -p /etc/letsencrypt/live/lqd.bhquan.store
                    openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                      -keyout /etc/letsencrypt/live/lqd.bhquan.store/privkey.pem \
                      -out \$CERT -subj /CN=lqd.bhquan.store 2>/dev/null && echo Placeholder OK
                  fi
                ' 2>&1 || echo '::warning::Placeholder cert failed — nginx may not start'
              MYSQL_ROOT_PASSWORD=\$(cat /tmp/mysql_root_pass.txt) docker compose -f ${INFRA_DIR}/docker-compose.yml up -d 2>&1
              rm -f /tmp/mysql_root_pass.txt
              for i in \$(seq 1 60); do
                docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && { echo 'MySQL ready!'; break; }
                [ \$i -eq 60 ] && { echo 'ERROR: MySQL not ready'; docker logs shared-mysql --tail 20; exit 1; }
                sleep 1
              done
              for i in \$(seq 1 20); do
                docker exec shared-nginx nginx -t 2>/dev/null && { echo 'Nginx ready!'; break; }
                [ \$i -eq 20 ] && { echo '::warning::Nginx not ready yet — continuing'; break; }
                sleep 2
              done
            fi
          "

      - name: "[INIT] Create DB + user"
        if: needs.build.outputs.mode == 'init'
        env:
          LQD_DB_PASSWORD: ${{ secrets.LQD_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          printf "CREATE DATABASE IF NOT EXISTS lqd CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\nCREATE USER IF NOT EXISTS 'lqd'@'%%' IDENTIFIED BY '%s';\nGRANT ALL PRIVILEGES ON lqd.* TO 'lqd'@'%%';\nFLUSH PRIVILEGES;\n" "$LQD_DB_PASSWORD" > /tmp/create_lqd.sql
          sshpass -e scp -P $PORT /tmp/create_lqd.sql $VPS:/tmp/create_lqd.sql
          rm -f /tmp/create_lqd.sql
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker cp /tmp/create_lqd.sql shared-mysql:/tmp/create_lqd.sql
            docker exec shared-mysql bash -c 'MYSQL_PWD=\"\$MYSQL_ROOT_PASSWORD\" mysql -u root < /tmp/create_lqd.sql' 2>&1
            docker exec shared-mysql rm -f /tmp/create_lqd.sql
            rm -f /tmp/create_lqd.sql
          "

      - name: "[INIT] SSL placeholder cert"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            CERT_VALID=\$(\$DC run --rm --entrypoint '' certbot sh -c \
              'openssl x509 -in /etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem -noout -checkend 3600 2>/dev/null && echo yes || echo no' \
              2>/dev/null || echo no)
            if [ \"\$CERT_VALID\" = 'no' ]; then
              echo 'Creating placeholder cert for lqd.bhquan.store...'
              \$DC run --rm --entrypoint '' certbot sh -c '
                mkdir -p /etc/letsencrypt/live/lqd.bhquan.store
                openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                  -keyout /etc/letsencrypt/live/lqd.bhquan.store/privkey.pem \
                  -out /etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem \
                  -subj /CN=lqd.bhquan.store 2>/dev/null && echo Placeholder OK
              ' || echo '::error::Failed to create placeholder cert'
            else
              echo 'Cert still valid for lqd.bhquan.store'
            fi
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      - name: "[INIT] Build & Start services"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          echo "=== VPS diagnostics ==="
          sshpass -e ssh -p $PORT $VPS "
            echo '--- Memory ---'; free -h
            echo '--- Disk ---'; df -h /
            echo '--- Docker disk ---'; docker system df
            echo '--- Running containers ---'; docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Size}}'
          "

          echo ""
          echo "=== Building backend ==="
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend 2>&1"
          if [ $? -ne 0 ]; then
            echo "::error::Backend build failed"
            sshpass -e ssh -p $PORT $VPS "free -h; dmesg | grep -i 'oom\|killed' | tail -5" 2>&1 || true
            exit 1
          fi

          echo ""
          echo "=== Building frontend ==="
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build frontend 2>&1"
          if [ $? -ne 0 ]; then
            echo "::error::Frontend build failed"
            sshpass -e ssh -p $PORT $VPS "free -h; dmesg | grep -i 'oom\|killed' | tail -5" 2>&1 || true
            exit 1
          fi

          echo ""
          echo "=== Starting services ==="
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d 2>&1"
          if [ $? -ne 0 ]; then
            echo "::error::Docker start failed"
            sshpass -e ssh -p $PORT $VPS "
              docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'lqd|shared'
              echo '--- Backend logs ---'; docker logs lqd-api --tail 30 2>&1
              echo '--- Frontend logs ---'; docker logs lqd-frontend --tail 30 2>&1
            "
            exit 1
          fi

          sshpass -e ssh -p $PORT $VPS "
            docker network connect lqd_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      - name: "[INIT] Get real SSL cert"
        if: needs.build.outputs.mode == 'init'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sleep 5
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            IS_REAL=\$(\$DC run --rm --entrypoint '' certbot sh -c '
              CERT=/etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem
              [ ! -f \"\$CERT\" ] && echo no && exit 0
              openssl x509 -in \"\$CERT\" -noout -checkend 2592000 2>/dev/null || { echo no; exit 0; }
              openssl x509 -in \"\$CERT\" -noout -issuer 2>/dev/null | grep -qiE \"let.s encrypt|R3|R10|R11|E5|E6\" && echo yes || echo no
            ' 2>/dev/null || echo no)
            if [ \"\$IS_REAL\" = 'yes' ]; then
              echo 'LE cert valid for lqd.bhquan.store — skip'
            else
              echo 'Requesting LE cert for lqd.bhquan.store...'
              \$DC run --rm --entrypoint '' certbot sh -c '
                rm -rf /etc/letsencrypt/live/lqd.bhquan.store  /etc/letsencrypt/live/lqd.bhquan.store-*
                rm -rf /etc/letsencrypt/archive/lqd.bhquan.store /etc/letsencrypt/archive/lqd.bhquan.store-*
                rm -f  /etc/letsencrypt/renewal/lqd.bhquan.store.conf /etc/letsencrypt/renewal/lqd.bhquan.store-*.conf
              '
              if timeout 120 \$DC run --rm --entrypoint '' certbot \
                certbot certonly --webroot -w /var/www/certbot \
                --non-interactive --cert-name lqd.bhquan.store \
                --email admin@bhquan.site --agree-tos --no-eff-email \
                -d lqd.bhquan.store 2>&1; then
                echo 'LE cert OK for lqd.bhquan.store'
              else
                echo '::warning::LE failed for lqd.bhquan.store — keeping placeholder cert'
              fi
              if docker inspect shared-nginx --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
                docker exec shared-nginx nginx -s reload 2>/dev/null && echo 'Nginx reloaded OK' || true
              fi
            fi
          " || true

      # ── UPDATE: Upload changed files ─────────────
      - name: "[UPDATE] Upload frontend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.fe == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/frontend/src"
          tar czf - frontend/src frontend/public frontend/package.json frontend/package-lock.json \
            frontend/Dockerfile frontend/next.config.mjs frontend/tailwind.config.ts \
            frontend/tsconfig.json frontend/postcss.config.mjs 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Upload backend"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.be == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf ${APP_DIR}/backend/src"
          tar czf - backend/src backend/package.json backend/package-lock.json \
            backend/Dockerfile backend/tsconfig.json \
            backend/tsconfig.build.json backend/nest-cli.json 2>/dev/null | \
            sshpass -e ssh -p $PORT $VPS "tar xzf - -C ${APP_DIR}/"

      - name: "[UPDATE] Sync config"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e scp -P $PORT docker-compose.prod.yml $VPS:${APP_DIR}/
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/db"
          sshpass -e scp -P $PORT -r db/changelog $VPS:${APP_DIR}/db/ 2>/dev/null || true

      - name: "[UPDATE] Sync nginx"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT nginx/conf.d/lqd.bhquan.store.conf $VPS:${INFRA_DIR}/nginx/conf.d/lqd.bhquan.store.conf
          sshpass -e ssh -p $PORT $VPS "
            DC='docker compose -f ${INFRA_DIR}/docker-compose.yml'
            CERT_VALID=\$(\$DC run --rm --entrypoint '' certbot sh -c \
              'openssl x509 -in /etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem -noout -checkend 3600 2>/dev/null && echo yes || echo no' \
              2>/dev/null || echo no)
            if [ \"\$CERT_VALID\" = 'no' ]; then
              echo 'No valid cert — creating placeholder'
              \$DC run --rm --entrypoint '' certbot sh -c '
                mkdir -p /etc/letsencrypt/live/lqd.bhquan.store
                openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                  -keyout /etc/letsencrypt/live/lqd.bhquan.store/privkey.pem \
                  -out /etc/letsencrypt/live/lqd.bhquan.store/fullchain.pem \
                  -subj /CN=lqd.bhquan.store 2>/dev/null
              ' || true
            fi
            echo '--- nginx config test ---'
            docker exec shared-nginx nginx -t 2>&1 || true
            if docker inspect shared-nginx --format '{{.State.Running}}' 2>/dev/null | grep -q true; then
              docker exec shared-nginx nginx -s reload 2>/dev/null && echo 'Nginx reloaded OK' || echo '::warning::nginx reload failed'
              sleep 3
              NGINX_STATUS=\$(docker inspect shared-nginx --format '{{.State.Status}}' 2>/dev/null || echo missing)
              if [ \"\$NGINX_STATUS\" != 'running' ]; then
                echo '::error::shared-nginx not running after config update (status='\$NGINX_STATUS')'
                docker logs shared-nginx --tail 20 2>&1 || true
                exit 1
              fi
              echo 'nginx: OK'
            else
              echo '::warning::shared-nginx not running — skip reload'
            fi
          "

      - name: "[UPDATE] Sync infra"
        if: needs.build.outputs.mode == 'update' && needs.build.outputs.infra == 'true'
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${INFRA_DIR}/nginx/conf.d"
          sshpass -e scp -P $PORT infra/docker-compose.yml $VPS:${INFRA_DIR}/
          printf "MYSQL_ROOT_PASSWORD='%s'\n" "$MYSQL_ROOT_PASSWORD" > /tmp/infra_update.env
          sshpass -e scp -P $PORT /tmp/infra_update.env $VPS:${INFRA_DIR}/.env
          sshpass -e ssh -p $PORT $VPS "chmod 600 ${INFRA_DIR}/.env"
          rm -f /tmp/infra_update.env
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker network create webphoto_backend 2>/dev/null || true
            docker network create lqd_frontend 2>/dev/null || true
            docker pull nginx:1.27-alpine 2>&1 | tail -1
            cd ${INFRA_DIR} && docker compose up -d --force-recreate 2>&1 | tail -5
            for i in \$(seq 1 30); do
              docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              [ \$i -eq 30 ] && { docker logs shared-mysql --tail 20; exit 1; }
              sleep 1
            done
          "

      - name: "[UPDATE] Rebuild backend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.be == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          echo "=== VPS resources before backend build ==="
          sshpass -e ssh -p $PORT $VPS "free -h; df -h /" 2>&1
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build backend 2>&1"
          if [ $? -ne 0 ]; then
            echo "::error::Backend build failed"
            sshpass -e ssh -p $PORT $VPS "free -h; dmesg | grep -i 'oom\|killed' | tail -5" 2>&1 || true
            exit 1
          fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d backend 2>&1"

      - name: "[UPDATE] Rebuild frontend"
        if: needs.build.outputs.mode == 'update' && (needs.build.outputs.fe == 'true' || needs.build.outputs.infra == 'true')
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          echo "=== VPS resources before frontend build ==="
          sshpass -e ssh -p $PORT $VPS "free -h; df -h /" 2>&1
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml build frontend 2>&1"
          if [ $? -ne 0 ]; then
            echo "::error::Frontend build failed"
            sshpass -e ssh -p $PORT $VPS "free -h; dmesg | grep -i 'oom\|killed' | tail -5" 2>&1 || true
            exit 1
          fi
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml up -d frontend 2>&1"

      - name: "[UPDATE] Ensure nginx connected"
        if: needs.build.outputs.mode == 'update'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            docker network connect lqd_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -s reload 2>/dev/null || true
          "

      # ── SHARED: Crontab + DB ─────────────────────
      - name: Install crontab (idempotent)
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "mkdir -p ${APP_DIR}/scripts"
          sshpass -e scp -P $PORT scripts/crontab.example $VPS:${APP_DIR}/scripts/crontab.example
          sshpass -e ssh -p $PORT $VPS "
            mkdir -p /var/log/lqd
            if [ ! -f /etc/cron.d/lqd ]; then
              if cp ${APP_DIR}/scripts/crontab.example /etc/cron.d/lqd 2>/dev/null; then
                chmod 644 /etc/cron.d/lqd
                chown root:root /etc/cron.d/lqd 2>/dev/null || true
                echo 'Crontab installed: /etc/cron.d/lqd'
                ls -la /etc/cron.d/lqd
              else
                echo '::warning::Cannot write /etc/cron.d/lqd — manual install needed:'
                echo '  sudo cp ${APP_DIR}/scripts/crontab.example /etc/cron.d/lqd && sudo chmod 644 /etc/cron.d/lqd'
              fi
            else
              echo 'Crontab already exists — skip (/etc/cron.d/lqd)'
              ls -la /etc/cron.d/lqd
            fi
          "

      - name: Ensure DB + user
        env:
          LQD_DB_PASSWORD: ${{ secrets.LQD_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          MYSQL_STATUS=$(sshpass -e ssh -p $PORT $VPS "docker ps --filter name=shared-mysql --format '{{.Names}}'" 2>&1)
          [ -z "$MYSQL_STATUS" ] && { echo "::warning::shared-mysql not running — skip"; exit 0; }
          printf "CREATE DATABASE IF NOT EXISTS lqd CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\nCREATE USER IF NOT EXISTS 'lqd'@'%%' IDENTIFIED BY '%s';\nGRANT ALL PRIVILEGES ON lqd.* TO 'lqd'@'%%';\nFLUSH PRIVILEGES;\n" "$LQD_DB_PASSWORD" > /tmp/ensure_lqd.sql
          sshpass -e scp -P $PORT /tmp/ensure_lqd.sql $VPS:/tmp/ensure_lqd.sql
          rm -f /tmp/ensure_lqd.sql
          sshpass -e ssh -p $PORT $VPS "
            export PATH=\$PATH:/usr/local/bin
            docker cp /tmp/ensure_lqd.sql shared-mysql:/tmp/ensure_lqd.sql
            docker exec shared-mysql bash -c 'MYSQL_PWD=\"\$MYSQL_ROOT_PASSWORD\" mysql -u root < /tmp/ensure_lqd.sql' 2>&1
            docker exec shared-mysql rm -f /tmp/ensure_lqd.sql
            rm -f /tmp/ensure_lqd.sql
          "

      - name: Run DB changelog
        id: changelog
        run: |
          set +e
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          [ ! -d "db/changelog" ] && exit 0

          MYSQL_CMD="docker exec -i shared-mysql mysql -u lqd -p${{ secrets.LQD_DB_PASSWORD }} lqd"

          echo "=== Running _init scripts ==="
          for f in $(find db/changelog/_init -name '*.sql' -type f 2>/dev/null | sort); do
            echo -n "  $(basename $f) ... "
            OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
            if [ $? -eq 0 ]; then echo "OK"; else echo "FAILED"; echo "$OUTPUT" | tail -3 | sed 's/^/    /'; fi
          done

          echo "=== Running versioned migrations ==="
          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")
          PASS=0; SKIP=0; FAIL=0

          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f"); KEY="${VER}/${FNAME}"
              echo "$APPLIED" | grep -qF "$KEY" && { ((SKIP++)); continue; }
              echo -n "  $FNAME ... "
              OUTPUT=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1)
              if [ $? -eq 0 ]; then
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//;s/\.sql$//;s/_/ /g')
                CHECKSUM=$(sha256sum "$f" | cut -d' ' -f1)
                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"REPLACE INTO schema_changelog (version,filename,description,applied_by,checksum) VALUES ('$VER','$FNAME','$DESC','ci','$CHECKSUM')\"" 2>/dev/null
                echo "OK"; ((PASS++))
              else
                echo "FAILED"; echo "$OUTPUT" | tail -3 | sed 's/^/    /'; ((FAIL++))
              fi
            done
          done
          echo "Changelog: $PASS applied, $SKIP skipped, $FAIL failed"

          if [ $PASS -gt 0 ] || [ "${{ needs.build.outputs.mode }}" = "init" ]; then
            echo "db_changed=true" >> $GITHUB_OUTPUT
          else
            echo "db_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Restart after DB changes
        if: steps.changelog.outputs.db_changed == 'true'
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "cd ${APP_DIR} && docker compose -f docker-compose.prod.yml restart backend frontend" 2>&1 || true
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4200/api/health" > /dev/null 2>&1 && { echo "Backend ready!"; break; }
            if [ $i -eq 30 ]; then
              echo "::error::Backend not ready after 60s post-migration"
              sshpass -e ssh -p $PORT $VPS "docker logs lqd-api --tail 30" 2>&1
              exit 1
            fi
            sleep 2
          done

      - name: Seed data (idempotent)
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          for i in $(seq 1 15); do
            sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4200/api/health" > /dev/null 2>&1 && break
            sleep 2
          done

          for SEED in admin-seed content-seed seed-categories-articles seed-events seed-contacts-settings-nav seed-media pages-seed seed-pages-part1 seed-pages-part2 seed-pages-part3 seed-admissions; do
            sshpass -e ssh -p $PORT $VPS "
              cd ${APP_DIR}
              docker compose -f docker-compose.prod.yml exec -T backend node dist/database/seeds/${SEED}.js 2>&1
            " || echo "::warning::${SEED}: skipped"
          done

  # ─── STAGE 4: VERIFY ────────────────────────────
  verify:
    name: "4. Health Check"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Wait for services
        run: sleep 10

      - name: Backend health
        run: |
          set +e
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          echo "=== Container status ==="
          sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}' | grep -E 'lqd|shared'" 2>&1

          for i in $(seq 1 15); do
            RESULT=$(sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:4200/api/health" 2>&1)
            RC=$?
            if [ $RC -eq 0 ] && [ -n "$RESULT" ]; then
              echo "Backend: OK — $RESULT"
              exit 0
            fi
            echo "  Attempt $i/15 — curl exit $RC"
            sleep 2
          done

          echo "::error::Backend health check failed after 30s"
          sshpass -e ssh -p $PORT $VPS "docker logs lqd-api --tail 50" 2>&1
          exit 1

      - name: Frontend health
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          for i in $(seq 1 10); do
            sshpass -e ssh -p $PORT $VPS "curl -sf -o /dev/null http://localhost:3200" 2>/dev/null && { echo "Frontend: OK"; exit 0; }
            [ $i -eq 10 ] && { echo "::error::Frontend health check failed"; sshpass -e ssh -p $PORT $VPS "docker logs lqd-frontend --tail 20" 2>&1; exit 1; }
            sleep 2
          done

      - name: Container status
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "docker ps --filter 'name=lqd-' --filter 'name=shared-' --format 'table {{.Names}}\t{{.Status}}'"

      - name: Deploy summary
        run: |
          echo "=========================================="
          echo "  LeQuyDon — lqd.bhquan.store"
          echo "  Mode: ${{ needs.build.outputs.mode }}"
          echo "  FE: ${{ needs.build.outputs.fe }} | BE: ${{ needs.build.outputs.be }}"
          echo "  DB: ${{ needs.build.outputs.db }} | Infra: ${{ needs.build.outputs.infra }}"
          echo "=========================================="
